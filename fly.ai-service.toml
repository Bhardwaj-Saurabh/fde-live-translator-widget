# Python AI service — PRIVATE app (flycast only, no public IPs).
# Deploy from the assignment root:  fly deploy --config fly.ai-service.toml
app = "saurabh-livetranslate-ai"
primary_region = "lhr"

[build]
  dockerfile = "backend/ai-service-python/Dockerfile"

[env]
  # primary: OpenRouter (key set via `fly secrets set OPENROUTER_API_KEY=…`);
  # fallback: Anthropic direct with MODEL (ANTHROPIC_API_KEY secret)
  OPENROUTER_MODEL = "anthropic/claude-haiku-4.5"
  MODEL = "claude-sonnet-4-6"
  TRANSLATION_DB_PATH = "/data/translations.db"

[mounts]
  source = "translations_data"
  destination = "/data"

# Reached only over the private network as http://saurabh-livetranslate-ai.flycast
[http_service]
  internal_port = 8000
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"   # FastAPI+httpx idles ~120MB; LLM work is remote
